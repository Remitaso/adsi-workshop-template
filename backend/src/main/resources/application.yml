spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/attendance
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  servlet:
    session:
      timeout: 30m
